{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Login — Mutisya</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/output.css' %}">
  <style>
    :root { --navy:#1B2A4A; --navy-hover:#243660; --gold:#C9A84C; --border:#E5E2DC; --base:#FAF8F5; --text:#1A1A1A; --text-muted:#9A9A9A; --danger:#C0392B; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--base); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: white; border-radius: 16px; box-shadow: 0 4px 32px rgba(0,0,0,0.1); padding: 40px; width: 100%; max-width: 400px; }
    .logo { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 700; color: var(--navy); text-align: center; margin-bottom: 8px; }
    .subtitle { text-align: center; color: var(--text-muted); font-size: 13px; margin-bottom: 32px; }
    label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    input { width: 100%; height: 44px; border: 1.5px solid var(--border); border-radius: 8px; padding: 0 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; margin-bottom: 16px; }
    input:focus { border-color: var(--navy); box-shadow: 0 0 0 3px rgba(27,42,74,0.08); }
    button { width: 100%; height: 44px; background: var(--navy); color: white; border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; }
    button:hover { background: var(--navy-hover); }
    .error { background: #FDECEA; color: var(--danger); padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">mutisya<span style="width:5px;height:5px;background:var(--gold);border-radius:50%;display:inline-block;margin-left:3px;vertical-align:middle;"></span></div>
    <div class="subtitle">Store Owner Dashboard</div>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post">
      {% csrf_token %}
      <label>Email</label>
      <input type="email" name="email" required autofocus>
      <label>Password</label>
      <input type="password" name="password" required>
      <button type="submit">Sign In</button>
    </form>
  </div>
</body>
</html>

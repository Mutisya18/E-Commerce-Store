{% extends "base.html" %}
{% block title %}Sign Out — Mutisya{% endblock %}
{% block content %}
<div style="min-height:60vh;display:flex;align-items:center;justify-content:center;padding:40px 16px;">
  <div style="background:var(--surface);border-radius:16px;box-shadow:var(--shadow-hover);padding:40px;width:100%;max-width:380px;text-align:center;">
    <h1 class="serif" style="font-size:26px;color:var(--forest);margin-bottom:12px;">Sign out?</h1>
    <p style="color:var(--text-muted);font-size:14px;margin-bottom:28px;">You'll need to sign in again to access your account.</p>
    <form method="post" action="{% url 'account_logout' %}">
      {% csrf_token %}
      <button type="submit" style="width:100%;height:44px;background:var(--forest);color:white;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:12px;">
        Yes, sign out
      </button>
    </form>
    <a href="/" style="font-size:13px;color:var(--text-muted);text-decoration:none;">Cancel</a>
  </div>
</div>
{% endblock %}
